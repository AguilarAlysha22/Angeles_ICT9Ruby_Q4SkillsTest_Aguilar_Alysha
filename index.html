<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<style>
    html, body{
        height: 100%;
    }
    body {
        margin: 0;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        background: url(imagebg.jpg);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }
    .login-container {
        background: #f5f5f5;
        padding: 40px;
        border-radius: 15px;
        height: 300px;
        width: 400px;
        text-align: center;
        border: 1px solid #5b2c83;
    }
    .login-title {
        background: #5b2c83;
        color: white;
        padding: 10px;
        border-radius: 20px;
        margin-bottom: 20px;
        font-weight: bold;
    }
    label {
        display: block;
        text-align: left;
        font-size: 14px;
        margin-bottom: 5px;
    }
    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .toggle {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }
    .toggle input {
        margin-right: 10px;
    }
    .toggle-text {
        font-size: 12px;
        color: #555;
        text-align: left;
    }
    .login-btn {
        background: #4da3d9;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
    }
    .login-btn:hover {
        background: #3b8ec2;
    }
    .logo {
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
    }
</style>
</head>
<body>
<div class="login-container">
    <div class="login-title">LOGIN</div>

    <label>Student Number</label>
    <input type="text" id="username" placeholder="Enter student number">

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">

    <div class="toggle">
        <input type="checkbox" id="remember">
        <div class="toggle-text">
            <strong>Stay logged in?</strong><br>
            Your account will stay active in this device.
        </div>
    </div>

    <button class="login-btn" onclick="login()"><strong>LOGIN</strong></button>
</div>

<img src="logo.png" class="logo">

<script>
    var user = "MrPotato67"
    var pass = "676767"
    var attempts = 0

    function login() {
        var u = document.getElementById("username").value;
        var p = document.getElementById("password").value;
        var remember = document.getElementById("remember").checked;

        for (let i = attempts; i < 3; i++){
            if (u === user && p === pass){
                alert("Login Successful!");

                if (remember) {
                    localStorage.setItem("loggedIn", "true")
                }

                window.location.href = "notebooks.html";
                return
            } else {
                attempts++;
                alert("Wrong. Attempts left: " + (3 - attempts))
                return;
            }
        }
    }
</script>
</body>
</html>
